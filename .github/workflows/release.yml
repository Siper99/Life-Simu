# 发布流水线：推送 v* 标签时构建 Windows 安装包并发布到 GitHub Release，
# 同时生成 updater 所需的 .sig 签名与 latest.json（旧版应用据此自动发现新版）。
#
# 需要在仓库 Settings → Secrets and variables → Actions 配置：
#   TAURI_SIGNING_PRIVATE_KEY = ~/.tauri/life-sim.key 的完整内容（私钥，千万别丢）
#
# 所有第三方 Action 已固定到完整 commit SHA（零成本的供应链防护，防 tag 被移到恶意提交）；
# 升级时手动更换下面的 SHA。
#
# 【可选·发布审批】将来若用户变多、担心仓库被攻破后推恶意自动更新，可再加一层人工审批：
#   GitHub 建受保护 Environment `release`（Required reviewers 设为自己、限定 v* 标签），
#   把签名私钥移到该 Environment，再给下面的 build job 加一行 `environment: release`。
#   个人/小众项目可跳过。

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable 分支（该仓库不打 tag），pin 到具体提交
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "人生模拟器 ${{ github.ref_name }}"
          releaseBody: "见 Assets：`life-sim_x.y.z_x64-setup.exe` 为安装包；`latest.json` 与 `.sig` 供自动更新使用。"
          releaseDraft: false
          prerelease: false
